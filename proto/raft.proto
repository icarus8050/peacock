syntax = "proto3";

package peacock.raft.v1;

option go_package = "peacock/raft/pb";

// Raft 노드 간 합의용 RPC 서비스. 클라이언트용 KV API는 별도 proto로 분리한다.
service Raft {
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
  rpc InstallSnapshot(stream InstallSnapshotChunk) returns (InstallSnapshotResponse);
}

enum EntryType {
  ENTRY_TYPE_UNSPECIFIED = 0;
  ENTRY_TYPE_NORMAL = 1;
  ENTRY_TYPE_CONF_CHANGE = 2;
  ENTRY_TYPE_NOOP = 3;
}

message Entry {
  uint64 term = 1;
  uint64 index = 2;
  EntryType type = 3;
  bytes data = 4;
}

message RequestVoteRequest {
  uint64 term = 1;
  string candidate_id = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term = 4;
  // pre_vote는 후순위 — M1에서는 무시한다.
  bool pre_vote = 5;
}

message RequestVoteResponse {
  uint64 term = 1;
  bool vote_granted = 2;
}

message AppendEntriesRequest {
  uint64 term = 1;
  string leader_id = 2;
  uint64 prev_log_index = 3;
  uint64 prev_log_term = 4;
  uint64 leader_commit = 5;
  repeated Entry entries = 6;
}

message AppendEntriesResponse {
  uint64 term = 1;
  bool success = 2;
  // follower가 어디까지 일치하는지 알려주는 최적화 힌트. 정확성에는 영향 없음.
  uint64 conflict_index = 3;
  uint64 conflict_term = 4;
}

// 첫 chunk만 meta가 채워지고 이후 chunk는 data만 가진다.
message InstallSnapshotChunk {
  oneof payload {
    SnapshotMeta meta = 1;
    bytes data = 2;
  }
}

message SnapshotMeta {
  uint64 term = 1;
  string leader_id = 2;
  uint64 last_included_index = 3;
  uint64 last_included_term = 4;
  // snapshot 시점의 cluster configuration 직렬화.
  bytes configuration = 5;
}

message InstallSnapshotResponse {
  uint64 term = 1;
}
